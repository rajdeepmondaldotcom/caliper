name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Set up Python
        run: uv python install 3.13
      - name: Validate tag matches pyproject version
        run: |
          set -euo pipefail
          project_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$project_version" = "$tag_version"
      - name: Install
        run: uv sync --all-extras --dev --python 3.13
      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Tests
        run: PYTHONWARNINGS=error::ResourceWarning uv run pytest
      - name: Coverage
        run: uv run pytest --cov=src/caliper --cov-report=term
      - name: Build distributions
        run: |
          rm -rf dist
          uv run python -m build
      - name: Check distributions
        run: uvx twine check dist/*
      - name: Smoke wheel entry point
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl)"
          uvx --from "$wheel" caliper --version
          uvx --from "$wheel" caliper --help
      - name: Generate SBOM (CycloneDX)
        run: |
          set -euo pipefail
          uvx --from cyclonedx-bom cyclonedx-py environment "$(uv run python -c 'import sys; print(sys.prefix)')" \
            --output-format json \
            --output-file dist/caliper-ai-${GITHUB_REF_NAME#v}.cdx.json
      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  github-draft:
    name: Stage GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist
      - name: Extract release notes
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## {re.escape(version)}(?:\s+-[^\n]*)?\n(?P<body>.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE | re.DOTALL)
          if not match:
              raise SystemExit(f"Could not find CHANGELOG notes for {version}")
          Path("RELEASE_NOTES.md").write_text(match.group("body").strip() + "\n", encoding="utf-8")
          PY
      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
            gh release edit "$tag" --draft --title "$tag" --notes-file RELEASE_NOTES.md --latest=false
          else
            gh release create "$tag" dist/* --draft --verify-tag --title "$tag" --notes-file RELEASE_NOTES.md --latest=false
          fi

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-draft
    environment:
      name: pypi
      url: https://pypi.org/project/caliper-ai/
    permissions:
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist
      - name: Remove non-distribution artifacts before upload
        run: |
          set -euo pipefail
          # Keep only sdist/wheel; SBOM and attestations are not PyPI artifacts.
          find dist -maxdepth 1 -type f ! \( -name '*.whl' -o -name '*.tar.gz' \) -print -delete
          ls -la dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true
          verbose: true

  github-publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: pypi
    permissions:
      contents: write
    steps:
      - name: Publish staged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest

  post-release-smoke:
    name: Verify the published release installs
    runs-on: ubuntu-latest
    needs: github-publish
    permissions:
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Resolve published version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Install from PyPI and smoke-test
        run: |
          set -euo pipefail
          # Allow the PyPI index a moment to propagate the new release.
          for i in 1 2 3 4 5; do
            if uvx --refresh --from "caliper-ai==${{ steps.ver.outputs.version }}" caliper --version; then
              exit 0
            fi
            echo "Attempt $i failed; sleeping…"
            sleep 15
          done
          echo "Published release did not install cleanly within retry budget."
          exit 1
