name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback. Pick the tag from the Actions UI when an automatic
  # run gets stuck (transient HTTP 403, PyPI propagation delay, etc.)
  # and rerun the full workflow without retagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to re-run (e.g. v0.0.15). Defaults to the branch ref."
        required: false
        type: string

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Set up Python
        run: uv python install 3.13
      - name: Lockfile check
        run: uv lock --check
      - name: Validate tag matches pyproject version
        run: |
          set -euo pipefail
          project_version="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as fh:
              print(tomllib.load(fh)["project"]["version"])
          PY
          )"
          tag_version="${RELEASE_TAG#v}"
          echo "RELEASE_VERSION=$tag_version" >> "$GITHUB_ENV"
          test "$project_version" = "$tag_version"
      - name: Install
        run: uv sync --all-extras --dev --python 3.13
      - name: Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Tests
        run: PYTHONWARNINGS=error::ResourceWarning uv run pytest
      - name: Coverage
        run: uv run pytest --cov=src/caliper --cov-report=term
      - name: Build distributions
        run: |
          rm -rf dist
          uv run python -m build
      - name: Check distributions
        run: uvx twine check dist/*
      - name: Smoke wheel entry point
        run: |
          set -euo pipefail
          wheel="$(ls dist/*.whl)"
          uvx --from "$wheel" caliper --version
          uvx --from "$wheel" caliper --help
          tmp="$(mktemp -d)"
          uvx --from "$wheel" caliper dashboard --demo --output "$tmp/dashboard.html"
          test -s "$tmp/dashboard.html"
          python - "$tmp/dashboard.html" <<'PY'
          from pathlib import Path
          import sys

          import re
          html = Path(sys.argv[1]).read_text(encoding="utf-8")
          # Exactly one EXECUTABLE inline script (`<script>` with no type
          # attribute). Non-executable data blocks like the cmd+K palette
          # index (`<script type="application/json">`) are data, not
          # behaviour, and don't count against the privacy gate.
          assert html.count("<script>") == 1, "expected exactly one executable inline dashboard script"
          # Every <script> open has a matching close; any extra script tag
          # MUST carry type="application/json" so it can't execute.
          opens = re.findall(r"<script(\s[^>]*)?>", html)
          closes = html.count("</script>")
          assert closes == len(opens), "open/close <script> mismatch"
          for attrs in opens:
              if attrs and attrs.strip():
                  assert 'type="application/json"' in attrs, (
                      f"unexpected non-JSON <script> attrs {attrs!r}"
                  )
          # `://` already catches any external URL inside any tag, so the
          # inline-data favicon (`<link rel="icon" href="data:…">`) is allowed.
          for needle in ("://", " src=", "fetch(", "XMLHttpRequest", "import("):
              assert needle not in html, f"dashboard privacy gate found {needle!r}"
          PY
      - name: Generate SBOM (CycloneDX)
        run: |
          set -euo pipefail
          uvx --from cyclonedx-bom cyclonedx-py environment "$(uv run python -c 'import sys; print(sys.prefix)')" \
            --output-format json \
            --output-file dist/caliper-ai-${RELEASE_TAG#v}.cdx.json
      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

  github-draft:
    name: Stage GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist
      - name: Extract release notes
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["RELEASE_TAG"].removeprefix("v")
          changelog = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = rf"^## {re.escape(version)}(?:\s+-[^\n]*)?\n(?P<body>.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE | re.DOTALL)
          if not match:
              raise SystemExit(f"Could not find CHANGELOG notes for {version}")
          Path("RELEASE_NOTES.md").write_text(match.group("body").strip() + "\n", encoding="utf-8")
          PY
      - name: Create or refresh draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          # Transient HTTP 403 has hit this step under high API load.
          # Retry three times with a short backoff before giving up.
          for attempt in 1 2 3; do
            if gh release view "$tag" >/dev/null 2>&1; then
              if gh release upload "$tag" dist/* --clobber \
                 && gh release edit "$tag" --draft --title "$tag" \
                      --notes-file RELEASE_NOTES.md --latest=false; then
                exit 0
              fi
            else
              if gh release create "$tag" dist/* --draft --verify-tag \
                   --title "$tag" --notes-file RELEASE_NOTES.md --latest=false; then
                exit 0
              fi
            fi
            echo "stage attempt $attempt failed; sleeping 10s..."
            sleep 10
          done
          echo "Stage GitHub release failed after 3 attempts."
          exit 1

  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-draft
    environment:
      name: pypi
      url: https://pypi.org/project/caliper-ai/
    permissions:
      contents: read
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: python-distributions
          path: dist
      - name: Remove non-distribution artifacts before upload
        run: |
          set -euo pipefail
          # Keep only sdist/wheel; SBOM and attestations are not PyPI artifacts.
          find dist -maxdepth 1 -type f ! \( -name '*.whl' -o -name '*.tar.gz' \) -print -delete
          ls -la dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          print-hash: true
          verbose: true

  github-publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: pypi
    permissions:
      contents: write
    steps:
      - name: Publish staged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG}"
          # Same transient HTTP 403 mitigation as the staging step.
          for attempt in 1 2 3; do
            if gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --draft=false --latest; then
              exit 0
            fi
            echo "publish attempt $attempt failed; sleeping 10s..."
            sleep 10
          done
          echo "Publish GitHub release failed after 3 attempts."
          exit 1

  post-release-smoke:
    name: Verify the published release installs
    runs-on: ubuntu-latest
    needs: github-publish
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_TAG }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Resolve published version
        id: ver
        run: |
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=${version}" >> "$GITHUB_ENV"
      - name: Install from PyPI and smoke-test
        run: |
          set -euo pipefail
          # Allow the PyPI index a moment to propagate the new release.
          # 8 x 15s = 2 minutes is enough on a typical day.
          for i in 1 2 3 4 5 6 7 8; do
            if uvx --refresh --from "caliper-ai==${{ steps.ver.outputs.version }}" caliper --version; then
              exit 0
            fi
            echo "Attempt $i: PyPI index lag, sleeping 15s..."
            sleep 15
          done
          echo "Published release did not install cleanly within retry budget."
          exit 1
      - name: Run published dashboard smoke
        run: |
          set -euo pipefail
          CALIPER_SMOKE_VERSION="${RELEASE_VERSION}" bash scripts/live-release-smoke.sh
