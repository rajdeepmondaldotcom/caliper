[build-system]
requires = ["hatchling>=1.26"]
build-backend = "hatchling.build"

[project]
name = "codex-meter"
version = "0.3.0"
description = "Local Codex usage intelligence for sessions, projects, models, cache, and rate-limit windows."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [
  { name = "Rajdeep Mondal" }
]
keywords = ["codex", "openai", "usage", "tokens", "cli", "credits"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development",
  "Topic :: Utilities",
  "Typing :: Typed"
]
dependencies = [
  "rich>=13.7",
  "typer>=0.12"
]

[project.optional-dependencies]
prom = ["prometheus-client>=0.20"]

[project.urls]
Homepage = "https://github.com/rajdeepmondaldotcom/codex-meter"
Repository = "https://github.com/rajdeepmondaldotcom/codex-meter"
Issues = "https://github.com/rajdeepmondaldotcom/codex-meter/issues"
Changelog = "https://github.com/rajdeepmondaldotcom/codex-meter/blob/main/CHANGELOG.md"

[project.scripts]
codex-meter = "codex_meter.cli:app"

[dependency-groups]
dev = [
  "build>=1.2",
  "prometheus-client>=0.20",
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "ruff>=0.6",
  "typer>=0.12"
]

[tool.hatch.build.targets.sdist]
include = [
  "/CHANGELOG.md",
  "/LICENSE",
  "/README.md",
  "/pyproject.toml",
  "/schemas",
  "/src/codex_meter",
]

[tool.hatch.build.targets.wheel]
packages = ["src/codex_meter"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["B008"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.coverage.run]
source = ["src/codex_meter"]
branch = true

[tool.coverage.report]
fail_under = 85
exclude_also = [
  "if __name__ == .__main__.:",
  "raise NotImplementedError",
  "pragma: no cover",
]
show_missing = true
